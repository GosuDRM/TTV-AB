name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Chrome
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: chrome
          fetch-depth: 0

      - name: Checkout Firefox
        uses: actions/checkout@v4
        with:
          ref: firefox
          path: firefox

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            chrome/package-lock.json
            firefox/package-lock.json

      - name: Read tag version
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like vX.Y.Z"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate Chrome version
        working-directory: chrome
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const constants = fs.readFileSync("src/modules/constants.ts", "utf8");
          const constantsVersion = constants.match(/VERSION:\s*"([^"]+)"/)?.[1];
          const versions = {
            package: packageJson.version,
            manifest: manifest.version,
            constants: constantsVersion,
          };
          for (const [name, value] of Object.entries(versions)) {
            if (value !== version) {
              throw new Error(`${name} version ${value} does not match tag ${version}`);
            }
          }
          NODE

      - name: Validate Firefox version
        working-directory: firefox
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const constants = fs.readFileSync("src/modules/constants.ts", "utf8");
          const constantsVersion = constants.match(/VERSION:\s*"([^"]+)"/)?.[1];
          const versions = {
            package: packageJson.version,
            manifest: manifest.version,
            constants: constantsVersion,
          };
          for (const [name, value] of Object.entries(versions)) {
            if (value !== version) {
              throw new Error(`${name} version ${value} does not match tag ${version}`);
            }
          }
          NODE

      - name: Write release notes
        working-directory: chrome
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const { execFileSync } = require("node:child_process");

          const tag = process.env.TAG;
          const version = process.env.VERSION;
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const header = new RegExp(`^## \\[${escapedVersion}\\][^\\n]*$`, "m").exec(changelog);
          if (!header) {
            throw new Error(`CHANGELOG.md is missing ${version}`);
          }

          const start = header.index + header[0].length;
          const rest = changelog.slice(start);
          const nextHeader = /^## \[/m.exec(rest);
          const section = rest.slice(0, nextHeader ? nextHeader.index : undefined).trim();
          if (!section) {
            throw new Error(`CHANGELOG.md entry for ${version} is empty`);
          }

          let log;
          try {
            const previousTag = execFileSync("git", ["describe", "--tags", "--abbrev=0", `${tag}^`], {
              encoding: "utf8",
              stdio: ["ignore", "pipe", "ignore"],
            }).trim();
            log = execFileSync("git", ["log", "--format=%B", `${previousTag}..${tag}`], {
              encoding: "utf8",
            });
          } catch {
            log = execFileSync("git", ["log", "--format=%B", "--grep", `v${version}`, "-n", "20", tag], {
              encoding: "utf8",
            });
          }

          const refs = Array.from(
            new Set(Array.from(log.matchAll(/\bRefs?\s+#(\d+)\b/gi), (match) => `#${match[1]}`)),
          );
          const refsText = refs.length ? `\n\nRefs ${refs.join(", ")}.` : "";
          const installText = [
            "## Install",
            `Chrome unpacked: download \`ttv-ab-${version}-chrome.zip\`, unzip it, open \`chrome://extensions\`, enable Developer mode, click \`Load unpacked\`, and select the unzipped folder.`,
            `Firefox: download \`ttv-ab-${version}.xpi\` and open it in Firefox.`,
          ].join("\n");
          fs.writeFileSync("release-notes.md", `${section}${refsText}\n\n${installText}\n`);
          NODE

      - name: Build Chrome
        working-directory: chrome
        run: |
          npm ci
          npm run build
          npm test
          test -f "ttv-ab-${{ steps.version.outputs.version }}-chrome-store.zip"
          cp "ttv-ab-${{ steps.version.outputs.version }}-chrome-store.zip" "ttv-ab-${{ steps.version.outputs.version }}-chrome.zip"
          test -f "ttv-ab-${{ steps.version.outputs.version }}-chrome.zip"

      - name: Build Firefox
        working-directory: firefox
        run: |
          npm ci
          npm run build
          npm test
          test -f "ttv-ab-${{ steps.version.outputs.version }}.xpi"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TTV AB ${{ github.ref_name }}
          body_path: chrome/release-notes.md
          fail_on_unmatched_files: true
          files: |
            chrome/ttv-ab-${{ steps.version.outputs.version }}-chrome.zip
            firefox/ttv-ab-${{ steps.version.outputs.version }}.xpi
